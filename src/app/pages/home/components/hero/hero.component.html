<section class="relative h-screen w-full bg-black overflow-hidden">
  <div *ngFor="let slide of slides; let i = index" 
       class="absolute inset-0 transition-opacity duration-1000 ease-in-out"
       [ngClass]="i === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'">
    
    <img [src]="slide.image" class="absolute inset-0 w-full h-full object-cover opacity-70" [alt]="slide.title">

    <div class="absolute inset-0 bg-gradient-to-r from-black via-black/40 to-transparent z-20"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-black/30 z-20"></div>

    <div class="relative z-30 container mx-auto px-6 md:px-12 h-full flex items-center">
      <div class="max-w-4xl w-full"> <p class="text-mercedes-silver text-xs md:text-sm tracking-[0.6em] uppercase mb-6 drop-shadow-md">
          {{ slide.topText }}
        </p>
        
        <h1 class="text-white text-5xl md:text-8xl font-extralight leading-tight mb-10 tracking-tight drop-shadow-2xl">
          {{ slide.title }} <br>
          <span class="font-bold text-white">{{ slide.subtitle }}</span>
        </h1>
        
        <div class="flex flex-wrap gap-6">
          <button class="btn btn-primary bg-mercedes-blue border-none rounded-none px-12 h-14 tracking-widest hover:scale-105 transition-all shadow-lg text-white">
            HİZMETLERİMİZ
          </button>
          <button class="btn btn-outline border-white text-white rounded-none px-12 h-14 tracking-widest hover:bg-white hover:text-black transition-all shadow-lg">
            İLETİŞİM
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-40 flex gap-4">
    <div *ngFor="let dot of slides; let i = index" 
         class="h-1 transition-all duration-500 rounded-full cursor-pointer"
         [ngClass]="i === currentIndex ? 'w-12 bg-blue-500' : 'w-6 bg-white/30'">
    </div>
  </div>
</section>
