<section class="py-20 bg-[#0a0a0a]/95 text-white overflow-hidden border-t border-white/5">
  <div class="container mx-auto px-6 md:px-12 mb-12">
    <div class="border-l-4 border-[#ff0000] pl-6">
      <h4 class="text-[#00adef] text-[10px] font-black tracking-[0.5em] uppercase mb-2">REFERANSLARIMIZ</h4>
      <h2 class="text-2xl md:text-3xl font-light uppercase tracking-tighter text-white">
        BİRLİKTE <span class="font-black italic text-[#00adef]">ÇALIŞTIĞIMIZ MARKALAR</span>
      </h2>
    </div>
  </div>

  <div class="relative w-full overflow-hidden py-12 logo-scroll-container">
    <div class="flex animate-marquee whitespace-nowrap items-center">
      <div *ngFor="let logo of logos" class="logo-card mx-10">
        <img [src]="'assets/referances/' + logo" 
             class="logo-img h-14 w-auto object-contain">
      </div>
      <div *ngFor="let logo of logos" class="logo-card mx-10">
        <img [src]="'assets/referances/' + logo" 
             class="logo-img h-14 w-auto object-contain">
      </div>
    </div>
  </div>
</section>
