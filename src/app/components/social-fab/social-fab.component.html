<div class="fixed bottom-8 right-8 z-[999] flex flex-col items-end gap-4">

  <div class="group flex items-center gap-3">
    <span class="opacity-0 group-hover:opacity-100 transition-all duration-300 bg-[#25D366] text-white text-[10px] font-black py-2 px-4 rounded-md shadow-lg translate-x-4 group-hover:translate-x-0 tracking-widest uppercase">
      WHATSAPP DESTEK
    </span>
    <a href="https://wa.me/905321742987" target="_blank" class="w-14 h-14 bg-[#25D366] rounded-full flex items-center justify-center text-white shadow-2xl hover:scale-110 transition-all duration-300 cursor-pointer">
      <lucide-icon name="message-circle" size="28"></lucide-icon>
    </a>
  </div>

  <div class="relative flex flex-col items-end gap-3">
    
    <div *ngIf="isOpen" class="flex flex-col items-center gap-3 mb-2 animate-in fade-in slide-in-from-bottom-10 duration-500">
      
      <a href="https://www.instagram.com/reparatiireconditionare/" target="_blank" class="w-12 h-12 bg-[#E1306C] text-white rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-all cursor-pointer">
        <lucide-icon name="instagram" size="22"></lucide-icon>
      </a>

      <a href="https://www.facebook.com/reperatii.reconditionare" target="_blank" class="w-12 h-12 bg-[#1877F2] text-white rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-all cursor-pointer">
        <lucide-icon name="facebook" size="22"></lucide-icon>
      </a>

      <a href="https://www.tiktok.com/@reparatii.reconditionare" target="_blank" class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-all cursor-pointer">
        <lucide-icon name="music-2" size="22"></lucide-icon>
      </a>

    </div>

    <div class="group flex items-center gap-3">
      <span class="opacity-0 group-hover:opacity-100 transition-all duration-300 bg-[#0a0a0a] text-white text-[10px] font-black py-2 px-4 rounded-md shadow-lg translate-x-4 group-hover:translate-x-0 tracking-widest uppercase border-r-4 border-[#00adef]">
        SOSYAL MEDYA
      </span>

      <button (click)="toggleMenu()" class="w-16 h-16 bg-gradient-to-tr from-[#00adef] to-[#0082b3] rounded-full flex items-center justify-center text-white shadow-2xl transition-all duration-500 hover:rotate-12 cursor-pointer relative">
        <lucide-icon [name]="isOpen ? 'x' : 'layout-grid'" size="28" class="transition-all"></lucide-icon>
        <span *ngIf="!isOpen" class="absolute -top-1 -right-1 bg-[#ff0000] text-white text-[10px] font-bold w-6 h-6 rounded-full flex items-center justify-center border-2 border-white shadow-md">
          3
        </span>
      </button>
    </div>

  </div>
</div>
