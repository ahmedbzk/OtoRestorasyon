<!doctype html>
<html lang="en" >
<head>
  <meta charset="utf-8">
  <title>REPARATİİ RECONDİTİONARE PİESE AUTO</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

  <body style="margin: 0; background-color: black;">
  
  <div id="global-splash" style="position: fixed; inset: 0; z-index: 999999; background: black; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease-out;">
    <div style="text-align: center;">
      <img src="assets/logo2.png" style="width: 250px; animation: pulse 3s ease-in-out forwards;" id="splash-logo">
    </div>
  </div>

  <style>
    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0; }
      20% { transform: scale(1); opacity: 1; }
      80% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }
  </style>


  <script>
    setTimeout(() => {
      const splash = document.getElementById('global-splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 800); // Animasyon bitince DOM'dan tamamen sil
      }
    }, 3000);
  </script>
  <app-root></app-root>

</body>

</body>

<script async src="https://www.tiktok.com/embed.js"></script>
</html>
